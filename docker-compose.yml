# ==========================================
# SEVEN T - Production Docker Compose
# Single VPS setup with Redis + pgvector
# ==========================================

version: '3.8'

services:
  # ==========================================
  # Main Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seven-t-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"   # Only accessible via Nginx (not exposed directly)
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER:-seven_t}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seven_t_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - BASE_URL=${BASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-SEVEN T <noreply@seven-t.com>}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GENIUSPAY_API_KEY=${GENIUSPAY_API_KEY}
      - GENIUSPAY_API_SECRET=${GENIUSPAY_API_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    volumes:
      - app_uploads:/app/uploads
      # NOTE: No sessions volume — sessions are stored in Redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - seven-t-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # ==========================================
  # PostgreSQL with pgvector extension
  # Use pgvector/pgvector image instead of plain postgres
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seven-t-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seven_t}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-seven_t_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seven_t} -d ${POSTGRES_DB:-seven_t_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seven-t-network

  # ==========================================
  # Redis — sessions Baileys + BullMQ + cache
  # ==========================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    container_name: seven-t-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - seven-t-network

  # ==========================================
  # Nginx Reverse Proxy (Production)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: seven-t-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - seven-t-network
    profiles:
      - production

  # ==========================================
  # Certbot for SSL (Production)
  # ==========================================
  certbot:
    image: certbot/certbot
    container_name: seven-t-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email ${ADMIN_EMAIL} -d ${DOMAIN} --agree-tos --no-eff-email
    profiles:
      - production

# ==========================================
# Volumes
# ==========================================
volumes:
  app_uploads:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  seven-t-network:
    driver: bridge
