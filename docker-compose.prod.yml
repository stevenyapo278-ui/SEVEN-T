# ==========================================
# SEVEN T - Dokploy Production Stack
# ==========================================
version: '3.8'

services:
  # ──────────────────────────────────────────────────────────────
  # BACKEND (API + Realtime)
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seven-t-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seven-t-net

  # ──────────────────────────────────────────────────────────────
  # WORKER (Dedicated Workflow Processor)
  # ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seven-t-worker
    command: ["node", "--max-old-space-size=1024", "backend/workers/index.js"]
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seven-t-net

  # ──────────────────────────────────────────────────────────────
  # FRONTEND (Nginx Internal)
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: seven-t-frontend
    restart: always
    networks:
      - seven-t-net

  # ──────────────────────────────────────────────────────────────
  # DATABASE (PostgreSQL + pgvector)
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seven-t-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seven-t-net

  # ──────────────────────────────────────────────────────────────
  # REDIS (Sessions + BullMQ Cache)
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: seven-t-redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seven-t-net

# ──────────────────────────────────────────────────────────────
# NETWORKS & VOLUMES
# ──────────────────────────────────────────────────────────────
networks:
  seven-t-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
